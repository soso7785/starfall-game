<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STARFALL — Catch the Light</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --void: #030308;
    --deep: #080818;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-gold: #ffd700;
    --neon-purple: #bf5af2;
    --star-white: #e8f4ff;
    --dim: rgba(255,255,255,0.08);
    --glow-cyan: 0 0 20px #00f5ff, 0 0 60px rgba(0,245,255,0.3);
    --glow-pink: 0 0 20px #ff006e, 0 0 60px rgba(255,0,110,0.3);
    --glow-gold: 0 0 20px #ffd700, 0 0 60px rgba(255,215,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--void);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: none;
  }

  /* ── STARFIELD BG ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.5s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── HOME ── */
  #home-screen {
    background: radial-gradient(ellipse at 50% 40%, rgba(0,245,255,0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 80%, rgba(191,90,242,0.08) 0%, transparent 60%),
                var(--void);
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 48px;
    animation: floatLogo 4s ease-in-out infinite;
  }

  @keyframes floatLogo {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(48px, 12vw, 80px);
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #00f5ff 0%, #bf5af2 50%, #ff006e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(10px, 2.5vw, 14px);
    letter-spacing: 0.5em;
    color: rgba(0,245,255,0.6);
    margin-top: 12px;
    text-transform: uppercase;
  }

  .stars-deco {
    display: flex; gap: 12px;
    margin: 20px 0 40px;
    justify-content: center;
  }
  .star-deco {
    font-size: 22px;
    animation: twinkle 2s ease-in-out infinite;
  }
  .star-deco:nth-child(2) { animation-delay: 0.4s; font-size: 28px; }
  .star-deco:nth-child(3) { animation-delay: 0.8s; }

  @keyframes twinkle {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  .btn-start {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 0.3em;
    color: var(--void);
    background: linear-gradient(135deg, #00f5ff, #bf5af2);
    border: none;
    padding: 18px 48px;
    border-radius: 60px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: var(--glow-cyan);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:active { transform: scale(0.95); }
  .btn-start::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #bf5af2, #ff006e);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-start:hover::before { opacity: 1; }

  .high-score-home {
    margin-top: 28px;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
  }
  .high-score-home span { color: var(--neon-gold); }

  /* ── HOW TO PLAY ── */
  .how-to {
    margin-top: 32px;
    display: flex; gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 340px;
  }
  .how-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
  }
  .how-icon { font-size: 22px; }

  /* ── GAME SCREEN ── */
  #game-screen { background: var(--void); }

  #game-canvas {
    position: absolute; inset: 0;
    z-index: 1;
    touch-action: none;
  }

  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 52px 28px 0;
    pointer-events: none;
  }

  .hud-score {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(32px, 8vw, 52px);
    color: #fff;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(0,245,255,0.6));
    transition: transform 0.1s;
  }
  .hud-score.pop {
    animation: scorePop 0.2s ease;
  }
  @keyframes scorePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .hud-right { text-align: right; }

  .lives-wrap {
    display: flex; gap: 6px; justify-content: flex-end;
    margin-bottom: 8px;
  }
  .life { font-size: 18px; transition: all 0.3s; }
  .life.lost { opacity: 0.15; filter: grayscale(1); }

  .level-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
  }
  .level-badge span { color: var(--neon-purple); font-weight: 700; }

  .combo-wrap {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    z-index: 20; pointer-events: none; text-align: center;
  }
  .combo-label {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(12px, 3vw, 16px);
    letter-spacing: 0.4em;
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .combo-label.show { opacity: 1; }
  .combo-count {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 10vw, 64px);
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.3s, transform 0.3s;
  }
  .combo-count.show { opacity: 1; transform: scale(1); }

  /* ── GAME OVER ── */
  #gameover-screen {
    background: radial-gradient(ellipse at 50% 50%, rgba(255,0,110,0.08) 0%, transparent 70%), var(--void);
  }

  .go-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(36px, 10vw, 64px);
    letter-spacing: 0.15em;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    margin-bottom: 8px;
  }

  .go-sub {
    font-size: 11px; letter-spacing: 0.4em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 48px;
  }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 40px;
    width: min(340px, 90vw);
  }

  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .stat-card.highlight { border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.05); }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(24px, 6vw, 36px);
    color: #fff;
    line-height: 1;
  }
  .stat-card.highlight .stat-value { color: var(--neon-gold); text-shadow: var(--glow-gold); }
  .stat-label {
    font-size: 9px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.35);
    margin-top: 6px; text-transform: uppercase;
  }

  .new-record {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: 0.4em;
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
    margin-top: 8px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-row { display: flex; gap: 16px; }

  .btn-retry {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 12px; letter-spacing: 0.3em;
    padding: 16px 32px;
    border-radius: 50px;
    cursor: pointer; border: none;
    transition: transform 0.15s;
  }
  .btn-retry:active { transform: scale(0.95); }
  .btn-retry.primary {
    background: linear-gradient(135deg, #ff006e, #bf5af2);
    color: #fff;
    box-shadow: var(--glow-pink);
  }
  .btn-retry.secondary {
    background: transparent;
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── EFFECTS ── */
  .tap-ring {
    position: fixed; z-index: 100;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--neon-cyan);
    transform: translate(-50%, -50%) scale(0);
    animation: tapExpand 0.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes tapExpand {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
  }

  .float-score {
    position: fixed; z-index: 100;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
    100% { transform: translate(-50%,-130%) scale(1); opacity: 0; }
  }

  /* ── PAUSE BTN ── */
  .pause-btn {
    position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 8px 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.2s;
  }
  .pause-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- HOME -->
<div class="screen" id="home-screen">
  <div class="logo-wrap">
    <div class="logo-title">STARFALL</div>
    <div class="logo-sub">Catch the Light</div>
  </div>
  <div class="stars-deco">
    <span class="star-deco">⭐</span>
    <span class="star-deco">✨</span>
    <span class="star-deco">💫</span>
  </div>
  <button class="btn-start" onclick="startGame()">JOUER</button>
  <div class="high-score-home" id="home-hs">Meilleur score : <span id="hs-display">0</span></div>
  <div class="how-to">
    <div class="how-item"><span class="how-icon">👆</span><span>Tape les étoiles</span></div>
    <div class="how-item"><span class="how-icon">⚡</span><span>Combos x bonus</span></div>
    <div class="how-item"><span class="how-icon">💜</span><span>3 vies</span></div>
    <div class="how-item"><span class="how-icon">🚫</span><span>Évite les bombes</span></div>
  </div>
</div>

<!-- GAME -->
<div class="screen hidden" id="game-screen">
  <canvas id="game-canvas"></canvas>
  <div class="hud">
    <div class="hud-score" id="score-display">0</div>
    <div class="hud-right">
      <div class="lives-wrap" id="lives-wrap">
        <span class="life">💜</span>
        <span class="life">💜</span>
        <span class="life">💜</span>
      </div>
      <div class="level-badge">NIVEAU <span id="level-display">1</span></div>
    </div>
  </div>
  <div class="combo-wrap">
    <div class="combo-label" id="combo-label">COMBO</div>
    <div class="combo-count" id="combo-count">x2</div>
  </div>
  <button class="pause-btn" onclick="goHome()">MENU</button>
</div>

<!-- GAME OVER -->
<div class="screen hidden" id="gameover-screen">
  <div class="go-title">GAME OVER</div>
  <div class="go-sub">LES ÉTOILES SONT ÉTEINTES</div>
  <div class="stats-grid">
    <div class="stat-card highlight">
      <div class="stat-value" id="final-score">0</div>
      <div class="stat-label">Score Final</div>
    </div>
    <div class="stat-card highlight" id="hs-card">
      <div class="stat-value" id="final-hs">0</div>
      <div class="stat-label">Record</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="final-stars">0</div>
      <div class="stat-label">Étoiles</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="final-combo">x0</div>
      <div class="stat-label">Meilleur Combo</div>
    </div>
  </div>
  <div class="new-record hidden" id="new-record">✦ NOUVEAU RECORD ✦</div>
  <div class="btn-row">
    <button class="btn-retry secondary" onclick="goHome()">MENU</button>
    <button class="btn-retry primary" onclick="startGame()">REJOUER</button>
  </div>
</div>

<script>
// ─── STARFIELD BG ───
const sfCanvas = document.getElementById('starfield');
const sfCtx = sfCanvas.getContext('2d');
let bgStars = [];

function initStarfield() {
  sfCanvas.width = window.innerWidth;
  sfCanvas.height = window.innerHeight;
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * sfCanvas.width,
      y: Math.random() * sfCanvas.height,
      r: Math.random() * 1.5 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.004 + 0.001,
      drift: (Math.random() - 0.5) * 0.1,
    });
  }
}

function drawStarfield() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  bgStars.forEach(s => {
    s.a += s.speed;
    s.x += s.drift;
    if (s.x < 0) s.x = sfCanvas.width;
    if (s.x > sfCanvas.width) s.x = 0;
    const alpha = 0.2 + 0.6 * Math.abs(Math.sin(s.a));
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(220,240,255,${alpha})`;
    sfCtx.fill();
  });
}

// ─── GAME STATE ───
let score = 0, lives = 3, level = 1;
let combo = 0, maxCombo = 0, totalStars = 0;
let objects = [], particles = [];
let gameRunning = false;
let spawnInterval, speedBase = 2.0, spawnDelay = 1000;
let animFrame;

const gameCanvas = document.getElementById('game-canvas');
const gCtx = gameCanvas.getContext('2d');

const STAR_TYPES = [
  { type: 'star',  emoji: '⭐', points: 10, color: '#FFD700', size: 38 },
  { type: 'star2', emoji: '💫', points: 20, color: '#00f5ff', size: 34 },
  { type: 'star3', emoji: '✨', points: 30, color: '#bf5af2', size: 36 },
  { type: 'bomb',  emoji: '💣', points: -1, color: '#ff006e', size: 40 },
];

function resize() {
  gameCanvas.width = window.innerWidth;
  gameCanvas.height = window.innerHeight;
  initStarfield();
}
window.addEventListener('resize', resize);
resize();

// ─── SPAWN ───
function spawnObject() {
  if (!gameRunning) return;
  const margin = 60;
  const x = margin + Math.random() * (gameCanvas.width - margin * 2);
  const bombChance = Math.min(0.15 + level * 0.04, 0.38);
  const isBomb = Math.random() < bombChance;
  const options = isBomb ? [STAR_TYPES[3]] : STAR_TYPES.slice(0, 3);
  const type = options[Math.floor(Math.random() * options.length)];

  const speed = speedBase + Math.random() * 1.5 + level * 0.3;

  objects.push({
    x, y: -type.size,
    vx: (Math.random() - 0.5) * 1.5,
    vy: speed,
    ...type,
    id: Math.random(),
    alpha: 1,
    scale: 1,
    wobble: Math.random() * Math.PI * 2,
  });
}

// ─── PARTICLES ───
function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const angle = (Math.PI * 2 * i) / 14;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color,
      life: 1,
      size: 2 + Math.random() * 4,
    });
  }
}

// ─── DRAW ───
function drawObjects() {
  objects.forEach(o => {
    gCtx.save();
    gCtx.globalAlpha = o.alpha;
    gCtx.translate(o.x, o.y);
    o.wobble += 0.05;
    gCtx.rotate(Math.sin(o.wobble) * 0.12);
    gCtx.font = `${o.size * o.scale}px serif`;
    gCtx.textAlign = 'center';
    gCtx.textBaseline = 'middle';
    // glow
    gCtx.shadowColor = o.color;
    gCtx.shadowBlur = 20;
    gCtx.fillText(o.emoji, 0, 0);
    gCtx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    gCtx.save();
    gCtx.globalAlpha = p.life;
    gCtx.fillStyle = p.color;
    gCtx.shadowColor = p.color;
    gCtx.shadowBlur = 10;
    gCtx.beginPath();
    gCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    gCtx.fill();
    gCtx.restore();
  });
}

// ─── GAME LOOP ───
function gameLoop() {
  if (!gameRunning) return;
  gCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

  // Update + draw objects
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    o.y += o.vy;
    o.x += o.vx;
    // off bottom — missed star = lose life
    if (o.y > gameCanvas.height + 60) {
      if (o.type !== 'bomb') {
        loseLife();
        combo = 0;
        updateComboUI();
      }
      objects.splice(i, 1);
    }
  }
  drawObjects();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.03;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
  }
  drawParticles();

  // Level up
  const newLevel = 1 + Math.floor(score / 200);
  if (newLevel !== level) {
    level = newLevel;
    document.getElementById('level-display').textContent = level;
    speedBase = 2.0 + level * 0.4;
    clearInterval(spawnInterval);
    spawnDelay = Math.max(350, 1000 - level * 80);
    spawnInterval = setInterval(spawnObject, spawnDelay);
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ─── TAP ───
function handleTap(clientX, clientY) {
  if (!gameRunning) return;

  // tap ring effect
  const ring = document.createElement('div');
  ring.className = 'tap-ring';
  ring.style.left = clientX + 'px';
  ring.style.top = clientY + 'px';
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 500);

  let hit = false;
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    const dist = Math.hypot(clientX - o.x, clientY - o.y);
    if (dist < o.size + 14) {
      hit = true;
      objects.splice(i, 1);

      if (o.type === 'bomb') {
        spawnParticles(o.x, o.y, '#ff006e');
        loseLife();
        combo = 0;
        updateComboUI();
        showFloat(o.x, o.y, '💥', '#ff006e');
      } else {
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        totalStars++;
        const multiplier = Math.min(Math.floor(combo / 3) + 1, 5);
        const pts = o.points * multiplier;
        score += pts;
        updateScore();
        spawnParticles(o.x, o.y, o.color);
        showFloat(o.x, o.y, `+${pts}`, o.color);
        updateComboUI();
      }
      break;
    }
  }
}

gameCanvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
gameCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => handleTap(t.clientX, t.clientY));
}, { passive: false });

// ─── UI ───
function updateScore() {
  const el = document.getElementById('score-display');
  el.textContent = score;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

let comboTimer;
function updateComboUI() {
  const label = document.getElementById('combo-label');
  const count = document.getElementById('combo-count');
  if (combo >= 3) {
    const m = Math.min(Math.floor(combo / 3) + 1, 5);
    count.textContent = `x${m}`;
    label.classList.add('show');
    count.classList.add('show');
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      if (combo < 3) { label.classList.remove('show'); count.classList.remove('show'); }
    }, 1500);
  } else {
    label.classList.remove('show');
    count.classList.remove('show');
  }
}

function showFloat(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function loseLife() {
  lives = Math.max(0, lives - 1);
  const lifeEls = document.querySelectorAll('.life');
  for (let i = lifeEls.length - 1; i >= 0; i--) {
    if (!lifeEls[i].classList.contains('lost')) {
      lifeEls[i].classList.add('lost');
      break;
    }
  }
  if (lives <= 0) endGame();
}

// ─── GAME CONTROL ───
function startGame() {
  score = 0; lives = 3; level = 1; combo = 0; maxCombo = 0; totalStars = 0;
  objects = []; particles = [];
  speedBase = 2.0; spawnDelay = 1000;
  gameRunning = true;

  document.getElementById('score-display').textContent = '0';
  document.getElementById('level-display').textContent = '1';
  const lifeEls = document.querySelectorAll('.life');
  lifeEls.forEach(l => l.classList.remove('lost'));
  document.getElementById('combo-label').classList.remove('show');
  document.getElementById('combo-count').classList.remove('show');

  show('game-screen');
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnObject, spawnDelay);
  if (animFrame) cancelAnimationFrame(animFrame);
  gameLoop();
}

function endGame() {
  gameRunning = false;
  clearInterval(spawnInterval);
  cancelAnimationFrame(animFrame);

  const hs = parseInt(localStorage.getItem('starfall_hs') || '0');
  const isNew = score > hs;
  if (isNew) localStorage.setItem('starfall_hs', score);
  const finalHs = Math.max(score, hs);

  document.getElementById('final-score').textContent = score;
  document.getElementById('final-hs').textContent = finalHs;
  document.getElementById('final-stars').textContent = totalStars;
  document.getElementById('final-combo').textContent = `x${maxCombo}`;
  document.getElementById('hs-display').textContent = finalHs;

  const nr = document.getElementById('new-record');
  isNew ? nr.classList.remove('hidden') : nr.classList.add('hidden');

  setTimeout(() => show('gameover-screen'), 400);
}

function goHome() {
  gameRunning = false;
  clearInterval(spawnInterval);
  cancelAnimationFrame(animFrame);
  const hs = localStorage.getItem('starfall_hs') || '0';
  document.getElementById('hs-display').textContent = hs;
  show('home-screen');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ─── MASTER LOOP ───
function masterLoop() {
  drawStarfield();
  requestAnimationFrame(masterLoop);
}
masterLoop();

// init
const initHs = localStorage.getItem('starfall_hs') || '0';
document.getElementById('hs-display').textContent = initHs;
</script>
